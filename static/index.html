<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CollectiveOS</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e1e4e8;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 14px 20px;
      border-bottom: 1px solid #21262d;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    header h1 { font-size: 1rem; font-weight: 600; letter-spacing: 0.02em; }
    header .dot { width: 8px; height: 8px; border-radius: 50%; background: #3fb950; }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .msg {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-width: 720px;
    }

    .msg.user  { align-self: flex-end; align-items: flex-end; }
    .msg.assistant { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 10px 14px;
      border-radius: 12px;
      line-height: 1.55;
      font-size: 0.9rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user .bubble {
      background: #1f6feb;
      color: #fff;
      border-bottom-right-radius: 3px;
    }

    .msg.assistant .bubble {
      background: #161b22;
      border: 1px solid #21262d;
      border-bottom-left-radius: 3px;
    }

    .label {
      font-size: 0.72rem;
      color: #8b949e;
      padding: 0 4px;
    }

    .typing span {
      display: inline-block;
      width: 6px; height: 6px;
      margin: 0 2px;
      background: #8b949e;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-6px); }
    }

    #token-bar {
      padding: 8px 20px;
      background: #0d1117;
      border-top: 1px solid #21262d;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    #token-bar label {
      font-size: 0.75rem;
      color: #8b949e;
      white-space: nowrap;
    }

    #token-input {
      flex: 1;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e1e4e8;
      font-size: 0.8rem;
      padding: 5px 10px;
      outline: none;
    }
    #token-input:focus { border-color: #1f6feb; }

    form {
      display: flex;
      gap: 8px;
      padding: 12px 20px;
      border-top: 1px solid #21262d;
      background: #0d1117;
      flex-shrink: 0;
    }

    #msg-input {
      flex: 1;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #e1e4e8;
      font-size: 0.9rem;
      padding: 10px 14px;
      resize: none;
      outline: none;
      min-height: 44px;
      max-height: 160px;
      overflow-y: auto;
    }
    #msg-input:focus { border-color: #1f6feb; }
    #msg-input::placeholder { color: #484f58; }

    button[type=submit] {
      background: #1f6feb;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 0.9rem;
      cursor: pointer;
      align-self: flex-end;
      transition: background 0.15s;
    }
    button[type=submit]:hover   { background: #388bfd; }
    button[type=submit]:disabled { background: #21262d; cursor: not-allowed; }

    #error {
      color: #f85149;
      font-size: 0.8rem;
      padding: 4px 20px;
      display: none;
    }
  </style>
</head>
<body>

<header>
  <div class="dot"></div>
  <h1>CollectiveOS</h1>
</header>

<div id="chat"></div>
<div id="error"></div>

<div id="token-bar">
  <label for="token-input">API token</label>
  <input id="token-input" type="password" placeholder="Paste your API_TOKEN here" autocomplete="off" />
</div>

<form id="chat-form">
  <textarea id="msg-input" placeholder="Ask anything…" rows="1"></textarea>
  <button type="submit">Send</button>
</form>

<script>
  const chat      = document.getElementById("chat");
  const form      = document.getElementById("chat-form");
  const input     = document.getElementById("msg-input");
  const tokenInput= document.getElementById("token-input");
  const errorEl   = document.getElementById("error");
  const submitBtn = form.querySelector("button[type=submit]");

  // Persist token in sessionStorage so you don't retype on refresh.
  tokenInput.value = sessionStorage.getItem("api_token") || "";
  tokenInput.addEventListener("input", () =>
    sessionStorage.setItem("api_token", tokenInput.value.trim())
  );

  // Auto-grow textarea.
  input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = input.scrollHeight + "px";
  });

  // Submit on Enter (Shift+Enter = newline).
  input.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); form.requestSubmit(); }
  });

  function addMessage(role, text) {
    const wrap   = document.createElement("div");
    wrap.className = `msg ${role}`;
    const label  = document.createElement("div");
    label.className = "label";
    label.textContent = role === "user" ? "You" : "Assistant";
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;
    wrap.appendChild(label);
    wrap.appendChild(bubble);
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
    return bubble;
  }

  function showTyping() {
    const wrap   = document.createElement("div");
    wrap.className = "msg assistant";
    wrap.id = "typing-indicator";
    const label  = document.createElement("div");
    label.className = "label";
    label.textContent = "Assistant";
    const bubble = document.createElement("div");
    bubble.className = "bubble typing";
    bubble.innerHTML = "<span></span><span></span><span></span>";
    wrap.appendChild(label);
    wrap.appendChild(bubble);
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeTyping() {
    document.getElementById("typing-indicator")?.remove();
  }

  function showError(msg) {
    errorEl.textContent = msg;
    errorEl.style.display = "block";
    setTimeout(() => { errorEl.style.display = "none"; }, 4000);
  }

  form.addEventListener("submit", async e => {
    e.preventDefault();
    const text  = input.value.trim();
    const token = tokenInput.value.trim();

    if (!text)  return;
    if (!token) { showError("Enter your API token above first."); return; }

    input.value = "";
    input.style.height = "auto";
    submitBtn.disabled = true;

    addMessage("user", text);
    showTyping();

    try {
      const resp = await fetch("/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${token}`,
        },
        body: JSON.stringify({ message: text }),
      });

      removeTyping();

      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        showError(`Error ${resp.status}: ${err.detail || resp.statusText}`);
      } else {
        const data = await resp.json();
        addMessage("assistant", data.reply);
      }
    } catch (err) {
      removeTyping();
      showError("Network error — is the server running?");
    } finally {
      submitBtn.disabled = false;
      input.focus();
    }
  });
</script>

</body>
</html>
