<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CollectiveOS</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@13/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e1e4e8;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 14px 20px;
      border-bottom: 1px solid #21262d;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    header h1 { font-size: 1rem; font-weight: 600; letter-spacing: 0.02em; flex: 1; }
    header .dot { width: 8px; height: 8px; border-radius: 50%; background: #3fb950; }

    .header-btn {
      background: none;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #8b949e;
      font-size: 0.78rem;
      padding: 5px 10px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .header-btn:hover { border-color: #58a6ff; color: #58a6ff; }
    .header-btn.active { border-color: #3fb950; color: #3fb950; }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .msg {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-width: 720px;
    }

    .msg.user  { align-self: flex-end; align-items: flex-end; }
    .msg.assistant { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 10px 14px;
      border-radius: 12px;
      line-height: 1.55;
      font-size: 0.9rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user .bubble {
      background: #1f6feb;
      color: #fff;
      border-bottom-right-radius: 3px;
    }

    .msg.assistant .bubble {
      background: #161b22;
      border: 1px solid #21262d;
      border-bottom-left-radius: 3px;
    }

    .label {
      font-size: 0.72rem;
      color: #8b949e;
      padding: 0 4px;
    }

    .typing span {
      display: inline-block;
      width: 6px; height: 6px;
      margin: 0 2px;
      background: #8b949e;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-6px); }
    }

    #token-bar {
      padding: 8px 20px;
      background: #0d1117;
      border-top: 1px solid #21262d;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    #token-bar label {
      font-size: 0.75rem;
      color: #8b949e;
      white-space: nowrap;
    }

    #token-input {
      flex: 1;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e1e4e8;
      font-size: 0.8rem;
      padding: 5px 10px;
      outline: none;
    }
    #token-input:focus { border-color: #1f6feb; }

    form {
      display: flex;
      gap: 8px;
      padding: 12px 20px;
      border-top: 1px solid #21262d;
      background: #0d1117;
      flex-shrink: 0;
    }

    #msg-input {
      flex: 1;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #e1e4e8;
      font-size: 0.9rem;
      padding: 10px 14px;
      resize: none;
      outline: none;
      min-height: 44px;
      max-height: 160px;
      overflow-y: auto;
    }
    #msg-input:focus { border-color: #1f6feb; }
    #msg-input::placeholder { color: #484f58; }

    #mic-btn {
      background: #161b22;
      color: #8b949e;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 10px 13px;
      font-size: 1rem;
      cursor: pointer;
      align-self: flex-end;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      line-height: 1;
    }
    #mic-btn:hover { border-color: #58a6ff; color: #58a6ff; }
    #mic-btn.listening {
      background: #3d1f1f;
      border-color: #f85149;
      color: #f85149;
      animation: pulse 1.2s infinite;
    }
    #mic-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.5; }
    }

    button[type=submit] {
      background: #1f6feb;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 0.9rem;
      cursor: pointer;
      align-self: flex-end;
      transition: background 0.15s;
    }
    button[type=submit]:hover   { background: #388bfd; }
    button[type=submit]:disabled { background: #21262d; cursor: not-allowed; }

    #error {
      color: #f85149;
      font-size: 0.8rem;
      padding: 4px 20px;
      display: none;
    }

    .history-divider {
      align-self: center;
      font-size: 0.72rem;
      color: #484f58;
      border-top: 1px solid #21262d;
      width: 100%;
      text-align: center;
      padding-top: 8px;
      margin-bottom: 4px;
    }

    /* Markdown styles inside assistant bubbles */
    .msg.assistant .bubble { white-space: normal; }
    .msg.assistant .bubble p  { margin: 0 0 0.6em; }
    .msg.assistant .bubble p:last-child { margin-bottom: 0; }
    .msg.assistant .bubble ul,
    .msg.assistant .bubble ol { padding-left: 1.4em; margin: 0 0 0.6em; }
    .msg.assistant .bubble li { margin: 0.15em 0; }
    .msg.assistant .bubble code {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 1px 5px;
      font-family: "SF Mono", Consolas, monospace;
      font-size: 0.82em;
    }
    .msg.assistant .bubble pre {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 10px 12px;
      overflow-x: auto;
      margin: 0.5em 0;
    }
    .msg.assistant .bubble pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: 0.83em;
    }
    .msg.assistant .bubble strong { color: #e1e4e8; }
    .msg.assistant .bubble em    { color: #8b949e; }
    .msg.assistant .bubble a     { color: #58a6ff; }
    .msg.assistant .bubble blockquote {
      border-left: 3px solid #30363d;
      margin: 0.4em 0;
      padding-left: 0.8em;
      color: #8b949e;
    }
    .msg.assistant .bubble h1,
    .msg.assistant .bubble h2,
    .msg.assistant .bubble h3 {
      margin: 0.6em 0 0.3em;
      font-weight: 600;
    }

    /* Tool-use status lines injected by run_stream() */
    .tool-action {
      display: inline-block;
      background: #2d1f00;
      border: 1px solid #6e4c00;
      border-radius: 4px;
      color: #e3a000;
      font-size: 0.75rem;
      padding: 1px 7px;
      margin: 2px 0;
      font-style: normal;
    }
    .tool-read {
      display: inline-block;
      background: #0d1f0d;
      border: 1px solid #1f4f1f;
      border-radius: 4px;
      color: #3fb950;
      font-size: 0.75rem;
      padding: 1px 7px;
      margin: 2px 0;
      font-style: normal;
    }

    /* Settings panel */
    #settings-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
    }
    #settings-overlay.open { display: block; }

    #settings-panel {
      position: absolute;
      top: 0; right: 0; bottom: 0;
      width: 320px;
      background: #161b22;
      border-left: 1px solid #21262d;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #settings-panel header {
      padding: 16px 18px;
      border-bottom: 1px solid #21262d;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #settings-panel header h2 { font-size: 0.95rem; font-weight: 600; flex: 1; }
    #settings-close {
      background: none;
      border: none;
      color: #8b949e;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
    }
    #settings-close:hover { color: #e1e4e8; background: #21262d; }

    #settings-body {
      flex: 1;
      overflow-y: auto;
      padding: 14px 18px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .settings-section-title {
      font-size: 0.7rem;
      color: #484f58;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: 6px;
      margin-bottom: 4px;
    }

    .connector-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: #0d1117;
      border: 1px solid #21262d;
      border-radius: 8px;
      transition: border-color 0.15s;
    }
    .connector-row:hover { border-color: #30363d; }
    .connector-row.disabled { opacity: 0.55; }

    .connector-emoji { font-size: 1.1rem; }
    .connector-info  { flex: 1; }
    .connector-name  { font-size: 0.85rem; font-weight: 500; }
    .connector-meta  { font-size: 0.7rem; color: #484f58; margin-top: 2px; }

    /* Toggle switch */
    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }
    .toggle input { display: none; }
    .toggle-track {
      position: absolute;
      inset: 0;
      background: #30363d;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle input:checked + .toggle-track { background: #238636; }
    .toggle-thumb {
      position: absolute;
      top: 3px; left: 3px;
      width: 14px; height: 14px;
      background: #fff;
      border-radius: 50%;
      transition: left 0.2s;
      pointer-events: none;
    }
    .toggle input:checked ~ .toggle-thumb { left: 19px; }

    #settings-note {
      font-size: 0.72rem;
      color: #484f58;
      padding: 10px 0 4px;
      line-height: 1.5;
    }
  </style>
</head>
<body>

<header>
  <div class="dot"></div>
  <h1>CollectiveOS</h1>
  <button id="tts-btn" class="header-btn" title="Toggle read-aloud">🔊 Read aloud</button>
  <button id="new-chat-btn" class="header-btn" title="Start a new conversation">+ New chat</button>
  <button id="settings-btn" class="header-btn" title="Connector permissions">⚙ Settings</button>
</header>

<div id="chat"></div>
<div id="error"></div>

<div id="token-bar">
  <label for="token-input">API token</label>
  <input id="token-input" type="password" placeholder="Paste your API_TOKEN here" autocomplete="off" />
</div>

<form id="chat-form">
  <textarea id="msg-input" placeholder="Ask anything…" rows="1"></textarea>
  <button type="button" id="mic-btn" title="Speak your message">🎤</button>
  <button type="submit">Send</button>
</form>

<!-- Settings panel -->
<div id="settings-overlay">
  <div id="settings-panel">
    <header>
      <h2>⚙ Connector Permissions</h2>
      <button id="settings-close" title="Close">✕</button>
    </header>
    <div id="settings-body">
      <p class="settings-section-title">Connected apps</p>
      <div id="connector-list">Loading…</div>
      <p id="settings-note">
        <strong>Read</strong> tools (calendar lookup, email search, etc.) run freely.<br>
        <strong>Write / action</strong> tools always ask for your confirmation first.<br>
        Disabling a connector blocks all its tools immediately.
      </p>
    </div>
  </div>
</div>

<script>
  const chat       = document.getElementById("chat");
  const form       = document.getElementById("chat-form");
  const input      = document.getElementById("msg-input");
  const tokenInput = document.getElementById("token-input");
  const errorEl    = document.getElementById("error");
  const submitBtn  = form.querySelector("button[type=submit]");
  const newChatBtn    = document.getElementById("new-chat-btn");
  const settingsBtn   = document.getElementById("settings-btn");
  const settingsOvl   = document.getElementById("settings-overlay");
  const settingsClose = document.getElementById("settings-close");
  const connectorList = document.getElementById("connector-list");
  const micBtn        = document.getElementById("mic-btn");
  const ttsBtn        = document.getElementById("tts-btn");

  const STORAGE_TOKEN = "collectiveos_token";
  const STORAGE_CONV  = "collectiveos_conv_id";
  const STORAGE_TTS   = "collectiveos_tts";

  // Persist token across refreshes.
  tokenInput.value = localStorage.getItem(STORAGE_TOKEN) || "";
  tokenInput.addEventListener("input", () =>
    localStorage.setItem(STORAGE_TOKEN, tokenInput.value.trim())
  );

  let conversationId = parseInt(localStorage.getItem(STORAGE_CONV) || "", 10) || null;

  // ---------------------------------------------------------------------------
  // TTS toggle
  // ---------------------------------------------------------------------------
  let ttsEnabled = localStorage.getItem(STORAGE_TTS) === "true";

  function updateTtsBtn() {
    ttsBtn.classList.toggle("active", ttsEnabled);
    ttsBtn.title = ttsEnabled ? "Read aloud: ON (click to turn off)" : "Read aloud: OFF";
  }
  updateTtsBtn();

  ttsBtn.addEventListener("click", () => {
    ttsEnabled = !ttsEnabled;
    localStorage.setItem(STORAGE_TTS, ttsEnabled);
    updateTtsBtn();
    if (!ttsEnabled) speechSynthesis.cancel();
  });

  function speak(text) {
    if (!ttsEnabled || !window.speechSynthesis) return;
    speechSynthesis.cancel();
    // Strip markdown-style tool status lines before speaking.
    const clean = text.replace(/_\[.*?\]_/g, "").trim();
    if (!clean) return;
    const utt = new SpeechSynthesisUtterance(clean);
    utt.rate  = 1.05;
    utt.pitch = 1;
    speechSynthesis.speak(utt);
  }

  // ---------------------------------------------------------------------------
  // Mic / Speech recognition
  // ---------------------------------------------------------------------------
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognition = null;
  let isListening = false;

  if (!SpeechRecognition) {
    micBtn.disabled = true;
    micBtn.title = "Speech input not supported in this browser (use Chrome)";
  } else {
    recognition = new SpeechRecognition();
    recognition.continuous = false;
    recognition.interimResults = true;
    recognition.lang = "en-US";

    recognition.onstart = () => {
      isListening = true;
      micBtn.classList.add("listening");
      input.placeholder = "Listening…";
    };

    recognition.onend = () => {
      isListening = false;
      micBtn.classList.remove("listening");
      input.placeholder = "Ask anything…";
      // Auto-submit if there is transcribed text.
      if (input.value.trim()) form.requestSubmit();
    };

    recognition.onerror = (e) => {
      isListening = false;
      micBtn.classList.remove("listening");
      input.placeholder = "Ask anything…";
      if (e.error !== "no-speech" && e.error !== "aborted") {
        showError(`Mic error: ${e.error}`);
      }
    };

    recognition.onresult = (e) => {
      let transcript = "";
      for (const result of e.results) transcript += result[0].transcript;
      input.value = transcript;
      input.style.height = "auto";
      input.style.height = input.scrollHeight + "px";
    };

    micBtn.addEventListener("click", () => {
      if (isListening) {
        recognition.stop();
      } else {
        input.value = "";
        recognition.start();
      }
    });
  }

  // ---------------------------------------------------------------------------
  // UI helpers
  // ---------------------------------------------------------------------------
  input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = input.scrollHeight + "px";
  });

  input.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); form.requestSubmit(); }
  });

  newChatBtn.addEventListener("click", () => {
    localStorage.removeItem(STORAGE_CONV);
    location.reload();
  });

  // Replace _[ACTION: ...]_ and _[reading: ...]_ with styled spans before markdown.
  function injectToolMarkers(text) {
    return text
      .replace(/_\[ACTION: ([^\]]+)\]_/g,
        '<span class="tool-action">⚡ Action: $1</span>')
      .replace(/_\[reading: ([^\]]+)\]_/g,
        '<span class="tool-read">↳ $1</span>');
  }

  function renderBubble(bubble, role, text) {
    if (role === "assistant") {
      bubble.innerHTML = marked.parse(injectToolMarkers(text));
    } else {
      bubble.textContent = text;
    }
  }

  function addMessage(role, text) {
    const wrap   = document.createElement("div");
    wrap.className = `msg ${role}`;
    const label  = document.createElement("div");
    label.className = "label";
    label.textContent = role === "user" ? "You" : "Assistant";
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    renderBubble(bubble, role, text);
    wrap.appendChild(label);
    wrap.appendChild(bubble);
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
    return bubble;
  }

  function showTyping() {
    const wrap   = document.createElement("div");
    wrap.className = "msg assistant";
    wrap.id = "typing-indicator";
    const label  = document.createElement("div");
    label.className = "label";
    label.textContent = "Assistant";
    const bubble = document.createElement("div");
    bubble.className = "bubble typing";
    bubble.innerHTML = "<span></span><span></span><span></span>";
    wrap.appendChild(label);
    wrap.appendChild(bubble);
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeTyping() {
    document.getElementById("typing-indicator")?.remove();
  }

  function showError(msg) {
    errorEl.textContent = msg;
    errorEl.style.display = "block";
    setTimeout(() => { errorEl.style.display = "none"; }, 4000);
  }

  // ---------------------------------------------------------------------------
  // History restore
  // ---------------------------------------------------------------------------
  async function restoreHistory() {
    if (!conversationId) return;
    const token = localStorage.getItem(STORAGE_TOKEN) || "";
    if (!token) return;

    try {
      const resp = await fetch(`/history/${conversationId}`, {
        headers: { "Authorization": `Bearer ${token}` },
      });
      if (!resp.ok) {
        localStorage.removeItem(STORAGE_CONV);
        conversationId = null;
        return;
      }
      const { messages } = await resp.json();
      if (!messages.length) return;

      const divider = document.createElement("div");
      divider.className = "history-divider";
      divider.textContent = "— previous messages —";
      chat.appendChild(divider);

      for (const msg of messages) addMessage(msg.role, msg.content);
    } catch (_) {
      localStorage.removeItem(STORAGE_CONV);
      conversationId = null;
    }
  }

  restoreHistory();

  // ---------------------------------------------------------------------------
  // Send message
  // ---------------------------------------------------------------------------
  form.addEventListener("submit", async e => {
    e.preventDefault();
    const text  = input.value.trim();
    const token = tokenInput.value.trim();

    if (!text)  return;
    if (!token) { showError("Enter your API token above first."); return; }

    input.value = "";
    input.style.height = "auto";
    submitBtn.disabled = true;
    micBtn.disabled    = true;

    addMessage("user", text);
    showTyping();

    try {
      const resp = await fetch("/chat/stream", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${token}`,
        },
        body: JSON.stringify({ message: text, conversation_id: conversationId }),
      });

      removeTyping();

      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        showError(`Error ${resp.status}: ${err.detail || resp.statusText}`);
        return;
      }

      const bubble  = addMessage("assistant", "");
      const reader  = resp.body.getReader();
      const decoder = new TextDecoder();
      let   buffer  = "";
      let   rawText = "";  // accumulated plain text for markdown re-render and TTS

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split("\n");
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          const payload = JSON.parse(line.slice(6));

          if (payload.meta) {
            conversationId = payload.meta.conversation_id;
            localStorage.setItem(STORAGE_CONV, String(conversationId));
            continue;
          }
          if (payload.done) {
            speak(rawText);
            break;
          }
          if (payload.chunk) {
            rawText += payload.chunk;
            bubble.innerHTML = marked.parse(rawText);
            chat.scrollTop = chat.scrollHeight;
          }
        }
      }
    } catch (err) {
      removeTyping();
      showError("Network error — is the server running?");
    } finally {
      submitBtn.disabled = false;
      micBtn.disabled    = false;
      input.focus();
    }
  });

  // ---------------------------------------------------------------------------
  // Settings panel — connector permissions
  // ---------------------------------------------------------------------------
  const CONNECTOR_EMOJIS = {
    google_calendar: "📅",
    gmail:           "📧",
    google_drive:    "📁",
    todoist:         "✅",
    home_assistant:  "🏠",
    spotify:         "🎵",
    mac_system:      "💻",
    web_search:      "🔍",
  };

  async function loadPermissions() {
    const token = localStorage.getItem(STORAGE_TOKEN) || "";
    if (!token) {
      connectorList.innerHTML = "<p style='color:#f85149;font-size:0.8rem'>Enter your API token first.</p>";
      return;
    }
    try {
      const resp = await fetch("/permissions", {
        headers: { "Authorization": `Bearer ${token}` },
      });
      if (!resp.ok) throw new Error(resp.statusText);
      const { permissions } = await resp.json();
      renderPermissions(permissions);
    } catch (e) {
      connectorList.innerHTML = "<p style='color:#f85149;font-size:0.8rem'>Failed to load permissions.</p>";
    }
  }

  function renderPermissions(perms) {
    connectorList.innerHTML = "";
    for (const p of perms) {
      const emoji = CONNECTOR_EMOJIS[p.connector] || "🔌";
      const readCount  = p.read_tools.length;
      const writeCount = p.write_tools.length;
      const meta = [
        readCount  ? `${readCount} read` : null,
        writeCount ? `${writeCount} write` : null,
      ].filter(Boolean).join(" · ");

      const row = document.createElement("div");
      row.className = "connector-row" + (p.enabled ? "" : " disabled");
      row.innerHTML = `
        <span class="connector-emoji">${emoji}</span>
        <div class="connector-info">
          <div class="connector-name">${p.label}</div>
          <div class="connector-meta">${meta}</div>
        </div>
        <label class="toggle" title="${p.enabled ? "Enabled — click to disable" : "Disabled — click to enable"}">
          <input type="checkbox" data-connector="${p.connector}" ${p.enabled ? "checked" : ""}>
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      `;
      connectorList.appendChild(row);

      const cb = row.querySelector("input[type=checkbox]");
      cb.addEventListener("change", async () => {
        const enabled = cb.checked;
        const token = localStorage.getItem(STORAGE_TOKEN) || "";
        try {
          const res = await fetch(`/permissions/${p.connector}`, {
            method:  "PATCH",
            headers: {
              "Content-Type":  "application/json",
              "Authorization": `Bearer ${token}`,
            },
            body: JSON.stringify({ enabled }),
          });
          if (!res.ok) throw new Error();
          row.classList.toggle("disabled", !enabled);
          cb.parentElement.title = enabled ? "Enabled — click to disable" : "Disabled — click to enable";
        } catch (_) {
          cb.checked = !enabled;  // revert on failure
          showError("Failed to update permission.");
        }
      });
    }
  }

  settingsBtn.addEventListener("click", () => {
    settingsOvl.classList.add("open");
    loadPermissions();
  });

  settingsClose.addEventListener("click", () => {
    settingsOvl.classList.remove("open");
  });

  settingsOvl.addEventListener("click", e => {
    if (e.target === settingsOvl) settingsOvl.classList.remove("open");
  });
</script>

</body>
</html>
